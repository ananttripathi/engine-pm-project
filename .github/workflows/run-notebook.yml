# Run the Engine Predictive Maintenance notebook (manual or workflow_dispatch only).
# Does NOT run on push - use "ML Pipeline - Engine Predictive Maintenance" for push.
name: Run notebook

on:
  workflow_dispatch:  # only when you click "Run workflow" in Actions tab

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow git push from the notebook
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbconvert pandas numpy matplotlib seaborn scikit-learn mlflow joblib datasets huggingface_hub

      - name: Run notebook
        run: |
          jupyter nbconvert --to notebook --execute \
            --inplace \
            --ExecutePreprocessor.timeout=600 \
            AnantTripathi_EnginePredictiveMaintenance_Notebook.ipynb

    # Optional: upload the executed notebook or artifacts
    # - uses: actions/upload-artifact@v4
    #   with:
    #     name: notebook-output
    #     path: AnantTripathi_EnginePredictiveMaintenance_Notebook.ipynb
