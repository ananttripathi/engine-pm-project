# Automated GitHub Actions Workflow - Engine Predictive Maintenance
# Final submission: pipeline.yml listing all steps to execute each step of Machine Learning
# Push to main triggers this workflow; automate end-to-end ML pipeline.

name: ML Pipeline - Engine Predictive Maintenance

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow joblib huggingface_hub

      - name: Create data directory
        run: |
          mkdir -p engine_pm_project/data
          mkdir -p engine_pm_project/model_building

      - name: Data Registration (upload data to Hugging Face if token and data present)
        id: data_reg
        run: |
          if [ -f engine_pm_project/data/engine_data.csv ] && [ -n "${{ secrets.HF_TOKEN }}" ]; then
            python engine_pm_project/model_building/data_register.py
            echo "data_uploaded=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping data registration (no engine_data.csv or HF_TOKEN). Using HF dataset if available."
            echo "data_uploaded=false" >> $GITHUB_OUTPUT
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Data Preparation (load from HF or local, clean, split, upload splits)
        id: prep
        run: |
          python engine_pm_project/model_building/prep.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true

      - name: Model Building and Training (train, tune, log to MLflow, save best model)
        id: train
        run: |
          python engine_pm_project/model_building/train.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true

      - name: Deploy Streamlit app to Hugging Face Spaces
        id: deploy
        run: |
          python engine_pm_project/deployment/deploy_to_hf_spaces.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true

      - name: Summary
        run: |
          echo "Pipeline steps completed: Data Registration, Data Preparation, Model Training, Deploy to HF Spaces."
          echo "Ensure HF_TOKEN is set in repo Secrets for data/model upload and Streamlit Space deployment."
